name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # commonMain metadata compile = proof the engine is shared (no java.* leak → iOS-identical).
      # jvmTest = the identity gate (PDFBox text extraction + size + composite-glyph checks).
      # :composepdf-preview:jvmTest = the @Preview bridge renders headlessly (Compose Desktop screenshot).
      - name: Verify shared engine + run identity gate
        run: |
          chmod +x ./gradlew
          ./gradlew :composepdf:compileCommonMainKotlinMetadata :composepdf:jvmTest :composepdf-preview:jvmTest --no-configuration-cache

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jvm-test-report
          path: composepdf/build/reports/tests/jvmTest

  # macOS runner cross-compiles the Apple device targets and RUNS the common tests on an iOS
  # simulator — the cross-platform golden test executing natively on iOS is the empirical proof
  # that layout is identical to JVM/Android down to every glyph origin.
  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile iOS device targets + run iOS tests (cross-platform golden)
        run: |
          chmod +x ./gradlew
          ./gradlew :composepdf:compileKotlinIosArm64 :composepdf:compileKotlinIosX64 :composepdf:iosSimulatorArm64Test --no-configuration-cache
