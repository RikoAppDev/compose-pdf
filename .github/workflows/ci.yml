name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # commonMain metadata compile = proof the engine is shared (no java.* leak → iOS-identical).
      # jvmTest = the identity gate (PDFBox text extraction + size + composite-glyph checks).
      - name: Verify shared engine + run identity gate
        run: |
          chmod +x ./gradlew
          ./gradlew :composepdf:compileCommonMainKotlinMetadata :composepdf:jvmTest --no-configuration-cache

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jvm-test-report
          path: composepdf/build/reports/tests/jvmTest

  # macOS runner can cross-compile the Apple targets — proves the shared engine builds natively on iOS.
  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile iOS targets
        run: |
          chmod +x ./gradlew
          ./gradlew :composepdf:compileKotlinIosArm64 :composepdf:compileKotlinIosX64 :composepdf:compileKotlinIosSimulatorArm64 --no-configuration-cache
