name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    # macOS runner so the Apple (iOS) klibs can be produced alongside jvm + metadata.
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Upload signed artifacts to the OSSRH Staging API
        run: |
          chmod +x ./gradlew
          ./gradlew publishAllPublicationsToMavenCentralRepository --no-configuration-cache
        env:
          SIGNING_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          SIGNING_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          SIGNING_PASSWORD: ${{ secrets.GPG_PASSPHRASE }}
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}

      # The raw maven-publish upload lands in an OPEN OSSRH staging repository that is NOT visible in
      # the Central Portal until it is finalized — and the finalize call must come from the same IP
      # that uploaded (this runner). publishing_type=automatic releases it once validation passes.
      - name: Finalize deployment to Central Portal
        run: |
          AUTH=$(printf '%s:%s' "$OSSRH_USERNAME" "$OSSRH_PASSWORD" | base64 | tr -d '\n')
          URL="https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/io.github.rikoappdev?publishing_type=automatic"
          echo "POST $URL"
          # The OPEN staging repository can take a short while to register after the upload, so the
          # finalize call may briefly get "No repository found" (HTTP 400/404). Retry until it is
          # finalizable instead of failing the release on that race.
          for attempt in $(seq 1 12); do
            CODE=$(curl -sS -o /tmp/finalize.txt -w '%{http_code}' -X POST -H "Authorization: Bearer $AUTH" "$URL")
            echo "attempt $attempt: HTTP $CODE"; cat /tmp/finalize.txt; echo
            if [ "$CODE" -ge 200 ] && [ "$CODE" -lt 300 ]; then
              echo "Finalize succeeded."
              exit 0
            fi
            echo "Staging repository not finalizable yet; waiting 15s before retry..."
            sleep 15
          done
          echo "Finalize did not succeed after retries."
          exit 1
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
