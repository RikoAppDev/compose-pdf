name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    # macOS runner so the Apple (iOS) klibs can be produced alongside jvm + metadata.
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Stage every signed publication into a local Maven layout (composepdf/build/staging-deploy).
      - name: Stage signed artifacts
        run: |
          chmod +x ./gradlew
          ./gradlew publishAllPublicationsToMavenCentralRepository --no-configuration-cache
        env:
          SIGNING_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          SIGNING_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          SIGNING_PASSWORD: ${{ secrets.GPG_PASSPHRASE }}

      # Upload the bundle to the Central Portal Publisher API — the native path, with no legacy OSSRH
      # staging repository or finalize step (that combination published to the Portal but did not
      # reliably sync to the CDN). publishingType=AUTOMATIC validates and releases automatically.
      - name: Upload bundle to the Central Portal
        run: |
          STAGE="composepdf/build/staging-deploy"
          if [ ! -d "$STAGE" ]; then echo "Staging dir $STAGE not found"; exit 1; fi
          echo "Bundle contents:"; ( cd "$STAGE" && find . -type f | sed 's#^#  #' )
          ( cd "$STAGE" && zip -q -r "$GITHUB_WORKSPACE/central-bundle.zip" . )
          VERSION=$(grep '^VERSION_NAME=' gradle.properties | cut -d= -f2)
          AUTH=$(printf '%s:%s' "$OSSRH_USERNAME" "$OSSRH_PASSWORD" | base64 | tr -d '\n')
          URL="https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC&name=compose-pdf-$VERSION"
          echo "POST $URL"
          CODE=$(curl -sS -o /tmp/upload.txt -w '%{http_code}' -X POST \
            -H "Authorization: Bearer $AUTH" \
            -F "bundle=@$GITHUB_WORKSPACE/central-bundle.zip" \
            "$URL")
          echo "HTTP $CODE"; echo "Deployment id: $(cat /tmp/upload.txt)"; echo
          test "$CODE" -ge 200 -a "$CODE" -lt 300
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
